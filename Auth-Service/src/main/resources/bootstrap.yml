# src/main/resources/bootstrap.yml
# Este archivo se carga ANTES que application.yml y es crucial para Spring Cloud Config y Eureka.

spring:
  application:
    name: auth-service # Nombre de tu servicio, usado para buscar configs en Config Server y para Eureka
  cloud:
    config:
      enabled: true                  # Habilita el cliente de Config Server
      uri: http://localhost:8888     # URL de tu Config Server
      fail-fast: true                # La aplicación fallará si no puede conectar al Config Server
  discovery:
    enabled: true                    # Habilita el descubrimiento de servicios (necesario para Eureka)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # URL de tu Eureka Server
    register-with-eureka: true       # Registra este servicio en Eureka
    fetch-registry: true             # Obtiene el registro de servicios de Eureka
  instance:
    prefer-ip-address: true          # Prefiere usar la IP para registrarse en Eureka
    instance-id: "${spring.application.name}:${random.value}" # ID único de la instancia