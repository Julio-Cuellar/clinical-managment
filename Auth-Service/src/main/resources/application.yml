spring:
  config:
    import: configserver:http://localhost:8888
  application:
    name: auth-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/medical_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false
  security:
    user:
      name: auth-admin
      password: ${SPRING_SECURITY_PASSWORD}
  cloud:
    config:
      enabled: true
      uri: http://localhost:8888
      fail-fast: true
    discovery:
      enabled: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 2592000000

logging:
  level:
    org.springframework.security: DEBUG
    com.yourpackage.auth: DEBUG
    org.springframework.cloud.config: DEBUG
