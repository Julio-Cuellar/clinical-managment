server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          fail-on-route-definition-error: false
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authFallback
                    fallbackUri: forward:/fallback/auth

            - id: config-server
              uri: lb://CONFIG-SERVER
              predicates:
                - Path=/config/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
