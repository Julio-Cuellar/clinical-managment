version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: clinical-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: medical_auth
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

  auth-service:
    build:
      context: ./Auth-Service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - DB_PASSWORD=password123
      - JWT_SECRET=YourSecretKeyForJWTTokens123456789SecureKey
      - SPRING_SECURITY_PASSWORD=admin123
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/medical_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    ports:
      - "8081:8081"
    depends_on:
      - mysql
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      - DB_PASSWORD=password123
      - JWT_SECRET=YourSecretKeyForJWTTokens123456789SecureKey
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/medical_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - AUTH_SERVICE_URL=http://auth-service:8081
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - auth-service
    restart: unless-stopped

volumes:
  mysql_data: